apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.ngf.name }}
      namespace: {{ .Values.httpRoute.ngf.namespace }}
  hostnames:
    - {{ .Values.httpRoute.hostname }}
  rules:
    - backendRefs:
        - name: {{ .Values.name }}
          port: 8080
