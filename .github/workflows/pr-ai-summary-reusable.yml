name: PR AI Summary Reusable

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      repository:
        required: true
        type: string

jobs:
  ai_summary:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Bootstrap Python with pyenv
        run: |
          set -euo pipefail

          PYENV_ROOT="${HOME}/.pyenv"
          if [ ! -d "${PYENV_ROOT}" ]; then
            curl https://pyenv.run | bash
          fi

          export PYENV_ROOT
          export PATH="${PYENV_ROOT}/bin:${PATH}"
          eval "$(pyenv init -)"

          PYTHON_VERSION="3.12.10"
          FALLBACK_VERSION="miniconda3-latest"
          if pyenv install -s "${PYTHON_VERSION}"; then
            pyenv global "${PYTHON_VERSION}"
          else
            echo "CPython build failed (likely missing compiler toolchain). Falling back to ${FALLBACK_VERSION}."
            pyenv install -s "${FALLBACK_VERSION}"
            pyenv global "${FALLBACK_VERSION}"
          fi

          echo "PYENV_ROOT=${PYENV_ROOT}" >> "${GITHUB_ENV}"
          echo "PYTHON_BIN=${PYENV_ROOT}/shims/python" >> "${GITHUB_ENV}"

          python --version

      - name: Generate AI review fragment with local LLM
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VLLM_URL: ${{ vars.VLLM_URL }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
          VLLM_VERIFY_SSL: "false"
          VLLM_MODEL: ${{ vars.VLLM_MODEL }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ inputs.repository }}
          OUTPUT_FILE: report/ai.md
        run: |
          set -euo pipefail

          PYTHON_BIN="${PYTHON_BIN:-$(command -v python3 || command -v python || true)}"
          if [ -z "${PYTHON_BIN}" ]; then
            echo "Neither python3 nor python is available on this runner"
            exit 1
          fi

          "${PYTHON_BIN}" -m venv .venv-pr-ai
          . .venv-pr-ai/bin/activate
          python -m pip install --upgrade pip
          python -m pip install openai
          python .github/scripts/pr_ai_summary.py

      - name: Upload AI fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-report-ai
          path: report/ai.md
          if-no-files-found: warn
          retention-days: 1
