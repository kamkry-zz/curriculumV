name: PR AI Summary Reusable

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: true
        type: string
      repository:
        description: 'GitHub repository (owner/name)'
        required: true
        type: string

jobs:
  ai_summary:
    name: AI PR Review
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap Python with pyenv
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_VERSION="${PYTHON_VERSION:-3.14}"
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          export PATH="$PYENV_ROOT/bin:$PATH"

          if ! command -v pyenv &>/dev/null; then
            echo "::warning::pyenv not found, falling back to system python3"
            echo "USE_SYSTEM_PYTHON=true" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ ! -d "$(pyenv root)/versions/$PYTHON_VERSION" ]; then
            env PYTHON_CONFIGURE_OPTS="--enable-loadable-sqlite-extensions --enable-optimizations" \
              pyenv install -s "$PYTHON_VERSION"
          fi
          echo "PYENV_ROOT=$PYENV_ROOT" >> "$GITHUB_ENV"
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> "$GITHUB_ENV"

      - name: Generate AI review fragment
        id: generate
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VLLM_URL: ${{ vars.VLLM_URL }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
          VLLM_VERIFY_SSL: "false"
          VLLM_MODEL: ${{ vars.VLLM_MODEL }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ inputs.repository }}
          OUTPUT_FILE: report/ai.md
        run: |
          set -euo pipefail

          if [ "${USE_SYSTEM_PYTHON:-}" = "true" ]; then
            python3 -m venv .venv
          else
            export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
            export PATH="$PYENV_ROOT/bin:$PATH"
            eval "$(pyenv init -)"
            pyenv shell "$PYTHON_VERSION"
            python -m venv .venv
          fi

          source .venv/bin/activate
          pip install openai
          python .github/scripts/pr_ai_summary.py

      - name: Upload AI fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-report-ai
          path: report/ai.md
          if-no-files-found: warn
          retention-days: 1

      - name: Mark AI job success (unavailability is non-blocking)
        if: always()
        run: exit 0
