name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: curriculum-v-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/app-ci.yml
    with:
      app: curriculum-v
      dockerfile: Dockerfile
      build_context: .
      helm_chart: helm/curriculum-v
      sonar_sources: src,app.py
      push_image: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets: inherit
